<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    * {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}


html {
    scroll-behavior: smooth;
}



body {
    width: 100%;
    height: 100%;
    overflow-x: hidden;
    line-height: 1.7;
    padding: 1rem;
}



@font-face {
    font-family: cunia;
    src: url(fonts/cunia/Cunia.ttf) format('truetype');
}





.anime-name {
    width: 100%;
    padding: 1rem;
    display: flex;
    flex-direction: row;
    gap: 0.1rem;
}



.anime-name .span-letter {
    /* position: relative; */
    font-size: 3rem;
    opacity: 0;
    animation: letterAnime 1s forwards;
    transform: translateX(-30px);
    font-family: cunia;

}



#letter1 {
    animation-delay: 0s;
    z-index: 11;
}


#letter2 {
    animation-delay: 0.3s;
    z-index: 10;
}


#letter3 {
    animation-delay: 0.6s;
    z-index: 9;
}


#letter4 {
    animation-delay: 0.8s;
    z-index: 8;
}


#letter5 {
    animation-delay: 1.2s;
    z-index: 7;
}


#letter6 {
    animation-delay: 1.4s;
    z-index: 6;
}


#letter7 {
    animation-delay: 1.6s;
    z-index: 5;
}


#letter8 {
    animation-delay: 1.8s;
    z-index: 4;
}


#letter9 {
    animation-delay: 2s;
    z-index: 3;
}


#letter10 {
    animation-delay: 2.2s;
    z-index: 2;
}


#letter11 {
    animation-delay: 2.4s;
    z-index: 1;
}




@keyframes letterAnime {
    0% {
    opacity: 0;
    transform: translateX(-30px);
   }

   30% {
    opacity: 0;
   }


   70% {
    opacity: 1;
   }

   100% {
    opacity: 1;
    transform: translateX(30px);
   }
   
}



.nav-icon {
    position: relative;
    width: 42px;
    height: 32px;
    cursor: pointer;
}



.nav-icon span {
    position: absolute;
    width: 50%;
    height: 6px;
    background-color: black;
    transition: all 0.2s ease-in-out;
}



.nav-icon span:nth-child(odd) {
    left: 0;
    border-radius: 9px 0 0 9px;
}


.nav-icon span:nth-child(even) {
    left: 50%;
    border-radius: 0 9px 9px 0;
}


.nav-icon span:nth-child(1),
.nav-icon span:nth-child(2) {
    top: 0;
}





.nav-icon span:nth-child(3),
.nav-icon span:nth-child(4) {
    top: 13px;
}






.nav-icon span:nth-child(5),
.nav-icon span:nth-child(6) {
    top: 26px;
}




.nav-open .nav-icon span:nth-child(1),
.nav-open .nav-icon span:nth-child(6) {
    transform: rotate(45deg);
} 




.nav-open .nav-icon span:nth-child(2),
.nav-open .nav-icon span:nth-child(5) {
    transform: rotate(-45deg);
} 




.nav-open .nav-icon span:nth-child(1) {
    top: 8px;
    left: 5px;
}







.nav-open .nav-icon span:nth-child(2) {
    top: 8px;
    left: calc(50% - 5px);
}






.nav-open .nav-icon span:nth-child(3) {
    opacity: 0;
    left: -100%;
}







.nav-open .nav-icon span:nth-child(4) {
    opacity: 0;
    left: 150%;
}






.nav-open .nav-icon span:nth-child(5) {
    top: 19px;
    left: 5px;
}






.nav-open .nav-icon span:nth-child(6) {
    top: 19px;
    left: calc(50% - 5px);
}





nav {
    height: 60px;
    display: flex;justify-content: flex-end;
    align-items: center;
}



.link-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: row;
    align-items: center;
}



nav a {
    height: 100%;
}


#sidebar-active {
    display: none;
}



.open-sidebar-button, .close-sidebar-button {
    display: none;
}


@media (max-width: 450px) {
    .link-container {

        flex-direction: column;
        align-items: flex-start;

        position: fixed;
        top: 0;
        right: -100%;
        width: 300px;
        transition: 0.7s ease-out;
    }


    nav a {
        box-sizing: border-box;
        height: auto;
        width: 100%;
    }


.open-sidebar-button, .close-sidebar-button {
    display: block;

}



#sidebar-active:checked ~ .link-container {
    /* display: flex; */
    right: 0;
}




#sidebar-active:checked ~ #overlay {
    background-color: red;
    width: 100%;
    height: 100%;
    position: fixed;
    top: 0;
    left: 0;
}
}









.hamburger{
position:fixed;
top:20px;
left:20px;
cursor:pointer;
z-index:1001;
}

.hamburger span{
display:block;
width:30px;
height:3px;
background:black;
margin:6px;
transition:.4s;
}







.hamburger.active span:nth-child(1){
transform:rotate(45deg) translate(5px,5px);
}

.hamburger.active span:nth-child(2){
opacity:0;
}

.hamburger.active span:nth-child(3){
transform:rotate(-45deg) translate(7px,-6px);
}





</style>

<body>

    
<div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
  
  <div class="overlay" id="overlay"></div>
  
  <nav class="sidebar" id="sidebar">
    <h2>My Menu</h2>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Portfolio</a>
    <a href="#">Contact</a>
  </nav>
